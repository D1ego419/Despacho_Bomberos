<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Despacho Bomberos</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c62828">
</head>

<body>

    <!-- TÍTULO -->
    <h1>🚒 Central de Despacho</h1>

    <!-- DASHBOARD -->
    <div class="dashboard">

        <div class="card">
            <h3>🚨 Emergencias Activas</h3>
            <span id="totalEmergencias">0</span>
        </div>

        <div class="card">
            <h3>🚒 Disponibles</h3>
            <span id="totalDisponibles">0</span>
        </div>

        <div class="card">
            <h3>🚑 En Ruta</h3>
            <span id="totalRuta">0</span>
        </div>

        <div class="card">
            <h3>🔥 Incendios</h3>
            <span id="totalIncendios">0</span>
        </div>

    </div>

    <!-- PANEL DE DESPACHO -->
    <div class="panel">

        <input
            id="direccion"
            type="text"
            placeholder="Dirección de la emergencia">

        <select id="tipo">
            <option>Incendio</option>
            <option>Accidente</option>
            <option>Rescate</option>
            <option>Materiales Peligrosos</option>
        </select>

        <select id="compania">
            <option>Primera Compañía</option>
            <option>Segunda Compañía</option>
            <option>Tercera Compañía</option>
        </select>

        <select id="unidad">
            <option>B-1</option>
            <option>BX-1</option>
            <option>BR-1</option>
            <option>Z-1</option>
        </select>

        <button id="btnDespachar">
            Despachar
        </button>

    </div>

    <!-- MAPA -->
    <h2>🗺️ Mapa de Emergencias</h2>

    <div id="map"></div>

    <!-- ESTADO DE UNIDADES -->
    <h2>🚒 Estado de Unidades</h2>

    <table>

        <thead>
            <tr>
                <th>Unidad</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaUnidades">
        </tbody>

    </table>

    <!-- EMERGENCIAS ACTIVAS -->
    <h2>🚨 Emergencias Activas</h2>

    <table id="tablaDespachos">

        <thead>
            <tr>
                <th>N°</th>
                <th>Tipo</th>
                <th>Dirección</th>
                <th>Compañía</th>
                <th>Unidad</th>
                <th>Hora</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaBody">
        </tbody>

    </table>

    <!-- LEAFLET -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- APP -->
    <script type="module" src="app.js"></script>

</body>

</html>
